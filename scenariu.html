Amintiți-vă, domnilor profesori, cine sunteți și care e rolul vostru în viața noastră. Amintiți-vă de ce ați ales să fiți profesori. Doar amintiți-vă![Text Wrapping Break][Text Wrapping Break]Nu vă cerem să ne lăudați. Vă cerem doar să ne priviți cu adevărat. Să ne lăsați spațiu să greșim, să încercăm, să fim. Să înțelegeți că, dincolo de aparențe, suntem oameni în devenire.[Text Wrapping Break][Text Wrapping Break]BENDER: Dragii noștri părinți, [Text Wrapping Break]Voi sunteți primii care ne-ați văzut, primii care ne-ați ținut în brațe, primii care ne-ați promis că lumea e un loc sigur. Și totuși, uneori, tocmai voi sunteți cei în fața cărora ne simțim cel mai puțin noi înșine. Așteptările voastre ne apasă ca niște armuri prea grele pentru niște umeri încă firavi. Când ne spuneți că “trebuie să fim cei mai buni”, noi auzim că nu suntem suficienți. Când comparați notele noastre cu ale altora, noi simțim că nu ne vedeți eforturile, ci doar rezultatul. Și când sunteți prea obosiți sau prea ocupați ca să ne ascultați, ne obișnuim să tăcem, să ascundem, să renunțăm să mai cerem ajutor. Nu vrem să vă dezamăgim, dar vrem și spațiu să fim adolescenți: să greșim, să ne răzgândim, să descoperim cine suntem. Nu vrem să ne protejați de tot, ci să fiți acolo când lumea devine prea mult pentru noi. Vrem să știți că, deși părem distanți, avem nevoie de voi mai mult decât o arătăm. Nu ca judecători, ci ca aliați. Vă rugăm: priviți-ne nu prin ceea ce „ar trebui să fim”, ci prin cine devenim, pas cu pas.[Text Wrapping Break][Text Wrapping Break]ANDREW: Pentru colegii care ne rănesc:[Text Wrapping Break]Vouă, celor care râdeți de noi pe holuri, care aruncați cuvinte ca niște pietre, care vă hrăniți din reacțiile noastre, vrem să vă spunem ceva ce poate nu ați auzit niciodată: durerea pe care o provocați nu vă face mai puternici. Știm că uneori bullyingul vine din propriile voastre nesiguranțe, din teama că, dacă nu loviți primii, veți fi loviți voi. Dar să știți că loviturile voastre lasă urme adânci – unele nevăzute, care ne însoțesc mult după ce râsetele voastre s-au stins. Când ne strigați „ciudați”, „proști”, „nimeni”, ne luați bucăți din curajul de a fi noi înșine. Când faceți glume pe seama corpului nostru, a pasiunilor noastre, a vieților noastre, ne amintiți că vulnerabilitatea este un risc. Dar adevărul este că și voi sunteți adolescenți ca noi, cu propriile frici ascunse sub măști de sarcasm și bravură. Noi nu vrem război cu voi. Vrem doar un liceu în care fiecare poate respira fără teamă, în care nu trebuie să ne cerem scuze pentru cine suntem. Vă cerem nu să ne îmbrățișați, ci măcar să încetați să ne răniți. Într-o zi, veți înțelege cât de mult contează asta.[Text Wrapping Break][Text Wrapping Break]TOȚI: Semnat,[Text Wrapping Break]Cei pe care credeați că îi cunoașteți:

<script>
function render() {
  const text = document.getElementById("scriptInput").value;
  const lines = text.split("\n");
  const out = document.getElementById("output");

  out.innerHTML = "";

  lines.forEach(line => {
    if (!line.trim()) return;

    const div = document.createElement("div");
    div.classList.add("line");

    const isBender = /^bender\b/i.test(line.trim());

    div.textContent = line;

    if (isBender) {
      div.classList.add("bender-hidden");

      div.onclick = () => {
        div.classList.toggle("bender-hidden");
        div.classList.toggle("bender-visible");
      };
    }

    out.appendChild(div);
  });
}
</script>
